<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QuizGame – Host Waiting Room</title>
</head>
<body>
    <div id="main-container">
        <!--Tähän ladataan dynaamisesti kontenttia partials kansiosta pelin vaiheesta riippuen-->
    </div>

    <p>Test host_ip: {{HOST_IP}}</p>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script>
        // Tänne täytyy tehdä socket io event joka emittoi start_quiz_game eventin kun painetaan start_game nappia
        const socket = io();

        function loadView(viewName) {
            fetch(`/quizgame/host_partial/${viewName}`)
                .then(response => response.text())
                .then(html => {
                    document.getElementById('main-container').innerHTML = html;

                    if (viewName === "waiting") {
                        document.getElementById("start_game").addEventListener("click", startGame);
                        if (typeof startPollingPlayers === "function") startPollingPlayers();
                    } else {
                        if (typeof stopPollingPlayers === "function") stopPollingPlayers();
                    }
                });
        }

        // Emittoi start_quizgame, kun host painaa nappia.
        // Pelaajat ottavat tämän vastaan waiting roomissa ja siirtyvät quizgame_player näkymään.
        // itse eventin broadcastays tapahtuu sockets.py tiedostosta, että se lähtee pelaajille.
        function startGame() {
            socket.emit('start_quizgame', {"test": "test"});
            console.log("HOST EMIT start_quizgame");

            //Host liittyy lobbyyn
            socket.emit("join_lobby", { player_id: "{{ host_id }}" });
            console.log("HOST EMIT join_game (host joins the game room)");

            
        }

        socket.on('start_game', () => {
            console.log("HOST otti vastaan start_game eventin");
            loadView("game");
        });

         socket.on('next_question', () => {
            console.log("Host otti vastaan next_question");
         });

        window.addEventListener("DOMContentLoaded", () => {
            loadView("waiting");
        });
    </script>

        <h2>Join link:</h2>
        <img 
            src="data:image/png;base64,{{ qr_code }}" 
            alt="QR Code for players to join" 
        >
    </section>

    <!-- Game Screen (hidden until the host clicks “Start Game”) -->
    <section id="game-screen" style="display: none;">
        <h1 id="question">Waiting for question…</h1>
        <div id="timer">Timer: --</div>
    </section>

    <!-- Host logic: swap views & wire up socket events -->
    <script>
        const socket = io();
        const hostId = "{{ hostId }}";

        // join the shared "players" room
        socket.emit("join_game", { player_id: hostId });

        // start button handler
        document
            .getElementById("start-game")
            .addEventListener("click", () => {
                // tell server to kick off the loop
                socket.emit("start_game_loop", {"test": 123});

                // swap the UI
                document.getElementById("waiting-screen").style.display = "none";
                document.getElementById("game-screen").style.display    = "block";
            });

        // receive questions on the same connection
        socket.on("next_question", (data) => {
            document.getElementById("question").textContent = data.question;
            startCountdown(data.time_limit);
        });

        // countdown helper
        function startCountdown(seconds) {
            const timerEl = document.getElementById("timer");
            let timeLeft = seconds;

            const interval = setInterval(() => {
                timerEl.textContent = `Timer: ${timeLeft}s`;
                if (timeLeft-- <= 0) {
                    clearInterval(interval);
                }
            }, 1000);
        }
    </script>
</body>
</html>
